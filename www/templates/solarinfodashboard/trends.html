<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Solar Trends Dashboard</title>
    <link rel="stylesheet" href="hmitiles.css">
    <style>
        .hmi-sparkline-container {
            width: 100%;
            display: flex;
            flex-direction: column; /* Stacks the graph on top of the text stats */
            gap: 8px;
            background: #f7f7f7;
            border-radius: 4px;
            padding: 8px;
            box-sizing: border-box;
        }
        .hmi-sparkline-svg-wrapper {
            width: 100%;
            height: 100px; /* Gives the graph a nice fixed area */
        }
        .hmi-sparkline-svg {
            width: 100%;
            height: 100%;
            display: block;
        }
        .hmi-trend-line {
            fill: none;
            stroke: #4a90e2;
            stroke-width: 2.5;
            stroke-linecap: round;
        }
        /* Style for the Min/Max text under the graph */
        .hmi-trend-stats {
            display: flex;
            justify-content: space-between;
            font-family: monospace;
            font-size: 11px;
            color: #555555;
            border-top: 1px solid #e0e0e0;
            padding-top: 4px;
        }
        .hmi-stat-label {
            color: #888888;
        }
    </style>
    <script>
        const DOMOTICZ_URL = window.parent && window.parent.$ ? window.parent.$.domoticzurl : window.location.origin;

        document.addEventListener("DOMContentLoaded", () => {
            document.querySelectorAll("[data-chart-idx]").forEach(container => {
                const idx = container.getAttribute("data-chart-idx");
                const sensorType = (idx === "12") ? "Percentage" : "counter";
                const unit = (idx === "12") ? "%" : "W"; // Sets correct label units

                if (idx) {
                    fetchTrendData(idx, sensorType, unit, container);
                }
            });
        });

        async function fetchTrendData(idx, sensor, unit, container) {
            try {
                const targetUrl = `${DOMOTICZ_URL}/json.htm?type=command&param=graph&sensor=${sensor}&idx=${idx}&range=day`;
                
                const response = await fetch(targetUrl);
                if (!response.ok) throw new Error();
                const data = await response.json();

                if (data.result && data.result.length > 0) {
                    const points = data.result.map(item => parseFloat(item.v || item.v_1 || item.u || item.svalue || 0));
                    renderSparkline(container, points, unit);
                } else {
                    container.innerHTML = "<span style='color:#999; font-size:12px;'>No historical logs</span>";
                }
            } catch (err) {
                console.error("Trend load error:", err);
                container.innerHTML = "<span style='color:#ff0000; font-size:12px;'>API Error</span>";
            }
        }

        function renderSparkline(container, dataPoints, unit) {
            const width = 300;
            const height = 100;
            const padding = 5;

            // 1. Calculate the exact Min and Max values from the dataset
            const min = Math.min(...dataPoints);
            const max = Math.max(...dataPoints);
            const range = max - min === 0 ? 1 : max - min;

            const coords = dataPoints.map((val, index) => {
                const x = padding + (index / (dataPoints.length - 1)) * (width - padding * 2);
                const y = (height - padding) - ((val - min) / range) * (height - padding * 2);
                return `${x},${y}`;
            });

            // 2. Generate the layout with the SVG line graph and the text stats row
            container.innerHTML = `
                <div class="hmi-sparkline-svg-wrapper">
                    <svg viewBox="0 0 ${width} ${height}" class="hmi-sparkline-svg" preserveAspectRatio="none">
                        <path class="hmi-trend-line" d="M ${coords.join(' L ')}" />
                    </svg>
                </div>
                <div class="hmi-trend-stats">
                    <div><span class="hmi-stat-label">MIN:</span> ${Math.round(min)}${unit}</div>
                    <div><span class="hmi-stat-label">MAX:</span> ${Math.round(max)}${unit}</div>
                </div>
            `;
        }

        function goToMainDashboard() {
            window.location.href = "index.html";
        }
    </script>
</head>
<body>

	<header class="hmi-header-container">
		<div style="display: flex; align-items: center; gap: 15px;">
			<button class="hmi-exit-btn" onclick="goToMainDashboard()">◀ Live Values</button>
			<h1>Solar Performance Trends (Day)</h1>
		</div>
	</header>

    <main class="hmi-panel">
        
        <!-- ROW 1: POWER PRODUCTION & CONSUMPTION -->
        <div class="hmi-pack-card">
            <div class="hmi-card-header"><div class="hmi-pack-label">Solar Production (24h)</div></div>
            <div class="hmi-value-grid"><div class="hmi-sparkline-container" data-chart-idx="5">Loading...</div></div>
        </div>

        <div class="hmi-pack-card">
            <div class="hmi-card-header"><div class="hmi-pack-label">Grid Export (24h)</div></div>
            <div class="hmi-value-grid"><div class="hmi-sparkline-container" data-chart-idx="8">Loading...</div></div>
        </div>

        <div class="hmi-pack-card">
            <div class="hmi-card-header"><div class="hmi-pack-label">Grid Import (24h)</div></div>
            <div class="hmi-value-grid"><div class="hmi-sparkline-container" data-chart-idx="7">Loading...</div></div>
        </div>

        <div class="hmi-pack-card">
            <div class="hmi-card-header"><div class="hmi-pack-label">House Consumption (24h)</div></div>
            <div class="hmi-value-grid"><div class="hmi-sparkline-container" data-chart-idx="9">Loading...</div></div>
        </div>

        <!-- ROW 2: BATTERY STORAGE MANAGEMENT -->
        <div class="hmi-pack-card">
            <div class="hmi-card-header"><div class="hmi-pack-label">Battery Charging (24h)</div></div>
            <div class="hmi-value-grid"><div class="hmi-sparkline-container" data-chart-idx="10">Loading...</div></div>
        </div>

        <div class="hmi-pack-card">
            <div class="hmi-card-header"><div class="hmi-pack-label">Battery Discharging (24h)</div></div>
            <div class="hmi-value-grid"><div class="hmi-sparkline-container" data-chart-idx="11">Loading...</div></div>
        </div>

        <div class="hmi-pack-card">
            <div class="hmi-card-header"><div class="hmi-pack-label">Battery Level (24h)</div></div>
            <div class="hmi-value-grid"><div class="hmi-sparkline-container" data-chart-idx="12">Loading...</div></div>
        </div>

        <div class="hmi-pack-card hmi-card-placeholder">
            <div class="hmi-card-header"><div class="hmi-pack-label">[ SYSTEM TIME BAY ]</div></div>
        </div>

    </main>

</body>
</html>
