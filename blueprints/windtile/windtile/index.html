<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wind Tile</title>

    <!-- Link backward one folder level to reuse shared global common styles -->
    <link rel="stylesheet" href="../hmitiles.css">
	
	<!-- Link backward one folder level to the HMI tile engine -->
    <script src="../hmitiles.js" defer></script>
</head>
<body>

	<!-- Inside the header block of your sub-pages (e.g., alarmtile/index.html) -->
	<header class="hmi-header-bar">
		<!-- Left Sector Group -->
		<div class="hmi-header-left-group">
			<button class="hmi-exit-btn" onclick="goToDomoticzDashboard()">&#9664; Main Menu</button>
			<h2 class="hmi-header-title">
				Wind Tile
			</h2>
		</div>
		
		<!-- Right Sector Group -->
		<div class="hmi-header-right-group">
			<button class="hmi-exit-btn" onclick="goToHMITilesIndex()">HMITiles Index &#9654;</button>
		</div>
	</header>


    <!-- Master outer panel containing your grid -->
	<!-- Set the device idx according devices list -->
    <main class="hmi-panel">
        
        <!-- 
			TILE 1 ROW 1 COL 1
			COMPACT WIND MONITORING MATRIX
			Parses 'data= WB;WD;WS;WG;22;24' string arrays directly
		-->
		<div class="hmi-pack-card" data-type="wind" data-device-idx="30">
			
			<div class="hmi-card-header">
				<div class="hmi-pack-label">Wind</div>
				<div class="hmi-badge hmi-alarm-state wind-alert-badge" style="display: none;">STORM WARNING</div>
			</div>

			<div class="hmi-wind-grid">
				
				<div class="hmi-wind-columns">
					
					<!-- Column 1: Speed -->
					<div class="hmi-wind-col-split">
						<span class="hmi-wind-label">Speed</span>
						<span class="hmi-wind-val-line wind-speed-kmh">0</span>
						<span class="hmi-wind-subvalue wind-speed-ms">(0 m/s)</span>
					</div>

					<!-- Column 2: Gust -->
					<div class="hmi-wind-col-split">
						<span class="hmi-wind-label">Gust</span>
						<span class="hmi-wind-val-line wind-gust-kmh">54</span>
						<span class="hmi-wind-subvalue">km/h</span> <!-- Wraps text cleanly on line 2 -->
					</div>

					<!-- Column 3: Chill -->
					<div class="hmi-wind-col-split">
						<span class="hmi-wind-label">Chill</span>
						<span class="hmi-wind-val-line chill-color wind-chill-temp">21</span>
						<span class="hmi-wind-subvalue">°C</span>
					</div>

					<!-- Column 4: Temp -->
					<div class="hmi-wind-col">
						<span class="hmi-wind-label">Temp</span>
						<span class="hmi-wind-val-line wind-air-temp">18</span>
						<span class="hmi-wind-subvalue">°C</span>
					</div>

				</div>

				<!-- Lower Status Area Row Tracking -->
				<div class="hmi-wind-status-bar">
					<span class="hmi-wind-bf-desc wind-bf-value-desc">F0 - Calm</span> 
					<span class="hmi-wind-divider">•</span>
					<span class="hmi-wind-direction wind-direction-cardinal">Direction: N (0°)</span>
				</div>

			</div>
		</div>

		<footer class="hmi-footer-version">
			<span>HMITiles for Domoticz</span>
		</footer>

    </main>
</body>
</html>
