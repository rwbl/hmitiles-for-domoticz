<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>4-Switch Panel</title>

    <!-- Link backward one folder level to reuse shared global common styles -->
    <link rel="stylesheet" href="../hmitiles.css">
	
	<!-- Link backward to the HMI tile engine -->
    <script src="../hmitiles.js" defer></script>
</head>
<body>

	<!-- Inside the header block of index.html -->
	<header class="hmi-header-container">
		<div style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
			<!-- Left Side: Main Menu & Title -->
			<div style="display: flex; align-items: center; gap: 15px;">
				<button class="hmi-exit-btn" onclick="goToDomoticzDashboard()">◀ Main Menu</button>
				<h2>4-Switch Panel</h2>
			</div>

			<!-- Right Side: Navigation hook back to your master grid -->
			<div>
				<button class="hmi-exit-btn" onclick="goToHMITilesIndex()">HMITiles Index ➔</button>
			</div>
		</div>
	</header>

    <!-- Master outer panel containing your grid -->
	<!-- Set the device idx according devices list -->
    <main class="hmi-panel">
        
        <!-- 
			TILE ROW 1 COL 1: 4-SWITCH PANEL
			Integrates directly into your layout without hmitiles.js updates
		-->
		<div class="hmi-pack-card">

			<div class="hmi-card-header">
				<div class="hmi-pack-label">4-Switch Panel</div>
			</div>

			<div class="hmi-value-grid">
				<!-- SWITCH 1 (IDX 1) -->
				<div class="hmi-pack-innercard" data-type="switch" data-device-idx="1" style="margin: 0; min-height: auto;">
					<div class="hmi-card-header">
						<div class="hmi-pack-label">Switch 1</div>
						<div class="hmi-badge hmi-clickable-badge">OFF</div>
					</div>
				</div>
				<!-- SWITCH 2 (IDX 6) -->
				<div class="hmi-pack-innercard" data-type="switch" data-device-idx="6" style="margin: 0; min-height: auto;">
					<div class="hmi-card-header">
						<div class="hmi-pack-label">Switch 2</div>
						<div class="hmi-badge hmi-clickable-badge">OFF</div>
					</div>
				</div>
				<!-- SWITCH 3 (IDX 17) -->
				<div class="hmi-pack-innercard" data-type="switch" data-device-idx="17" style="margin: 0; min-height: auto;">
					<div class="hmi-card-header">
						<div class="hmi-pack-label">Switch 3</div>
						<div class="hmi-badge hmi-clickable-badge">OFF</div>
					</div>
				</div>
				<!-- SWITCH 4 (IDX 18) -->
				<div class="hmi-pack-innercard" data-type="switch" data-device-idx="18" style="margin: 0; min-height: auto;">
					<div class="hmi-card-header">
						<div class="hmi-pack-label">Switch 4</div>
						<div class="hmi-badge hmi-clickable-badge">OFF</div>
					</div>
				</div>
			</div>
		</div>

		<div class="hmi-pack-card">

			<div class="hmi-card-header">
				<div class="hmi-pack-label">4-Switch Panel</div>
			</div>

			<div class="hmi-value-grid">
				<!-- SWITCH 1 (IDX 1) -->
				<div class="hmi-pack-innercard" data-type="switch" data-device-idx="1" style="margin: 0; min-height: auto;">
					<div class="hmi-card-header">
						<div class="hmi-pack-label">Switch 1</div>
						<div class="hmi-badge hmi-clickable-badge">OFF</div>
					</div>
				</div>
				<!-- SWITCH 2 (IDX 6) -->
				<div class="hmi-pack-innercard" data-type="switch" data-device-idx="6" style="margin: 0; min-height: auto;">
					<div class="hmi-card-header">
						<div class="hmi-pack-label">Switch 2</div>
						<div class="hmi-badge hmi-clickable-badge">OFF</div>
					</div>
				</div>
				<!-- SWITCH 3 (IDX 17) -->
				<div class="hmi-pack-innercard" data-type="switch" data-device-idx="17" style="margin: 0; min-height: auto;">
					<div class="hmi-card-header">
						<div class="hmi-pack-label">Switch 3</div>
						<div class="hmi-badge hmi-clickable-badge">OFF</div>
					</div>
				</div>
				<!-- SWITCH 4 (IDX 18) -->
				<div class="hmi-pack-innercard" data-type="switch" data-device-idx="18" style="margin: 0; min-height: auto;">
					<div class="hmi-card-header">
						<div class="hmi-pack-label">Switch 4</div>
						<div class="hmi-badge hmi-clickable-badge">OFF</div>
					</div>
				</div>
			</div>
		</div>


		<footer class="hmi-footer-version">
			<span>HMITiles for Domoticz</span>
		</footer>

    </main>
</body>
</html>
