<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Value Image Tile</title>

    <!-- Link backward one folder level to reuse shared global common styles -->
    <link rel="stylesheet" href="../hmitiles.css">
	
	<!-- Link backward to the HMI tile engine -->
    <script src="../hmitiles.js" defer></script>
</head>
<body>

	<!-- Inside the header block of your sub-pages (e.g., alarmtile/index.html) -->
	<header class="hmi-header-bar">
		<!-- Left Sector Group -->
		<div class="hmi-header-left-group">
			<button class="hmi-exit-btn" onclick="goToDomoticzDashboard()">&#9664; Main Menu</button>
			<h2 class="hmi-header-title">
				Value Image Tile
			</h2>
		</div>
		
		<!-- Right Sector Group -->
		<div class="hmi-header-right-group">
			<button class="hmi-exit-btn" onclick="goToHMITilesIndex()">HMITiles Index &#9654;</button>
		</div>
	</header>


    <!-- Master outer panel containing your grid -->
	<!-- Set the device idx according devices list -->
    <main class="hmi-panel">
        
        <!-- 
			TILE 1 ROW 1 COL 1
			ALERT IMAGE 48x48px + VALUE DATA
			Value also shown in the badge.
			Uses Domoticz images Alert48_0.png located in the www/images folder.
		-->
		<div class="hmi-pack-card" data-type="icon-tile" data-device-idx="5">
			<!-- Header block holding title and status token -->
			<div class="hmi-card-header">
				<div class="hmi-pack-label">Value Image (no badge)</div>
				<div class="hmi-badge" style="display: none;"></div>
			</div>

			<!-- Icon Status Row -->
			<div class="hmi-icon-wrapper">
				<img src="/images/Alert48_0.png" alt="Status" width="48" height="48">
			</div>
						
			<!-- Data Value -->
            <div class="hmi-value-grid">
                <div class="hmi-value-box">
                    <div class="hmi-box-data">
                        <span class="hmi-value">--</span>
                    </div>
                </div>
            </div>
		</div>

        <!-- 
			TILE 2 ROW 1 COL 2
			ALERT IMAGE 48x48px + VALUE BADGE
			Uses Domoticz images Alert48_4.png located in the www/images folder.
		-->
		<div class="hmi-pack-card" data-type="icon-tile" data-device-idx="5">
			<!-- Header block holding title and status token -->
			<div class="hmi-card-header">
				<div class="hmi-pack-label">Value Image (value in badge)</div>
				<div class="hmi-badge">NORMAL</div>
			</div>

			<!-- Icon Status Row -->
			<div class="hmi-icon-wrapper">
				<img src="/images/Alert48_4.png" alt="Status" width="48" height="48">
			</div>
		</div>

		<footer class="hmi-footer-version">
			<span>HMITiles for Domoticz</span>
		</footer>

    </main>
</body>
</html>
