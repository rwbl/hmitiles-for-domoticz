<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Value Image Tile</title>

    <!-- Link backward one folder level to reuse shared global common styles -->
    <link rel="stylesheet" href="../hmitiles.css">
	
	<!-- Link backward to the HMI tile engine -->
    <script src="../hmitiles.js" defer></script>

    <script>
		// Target device tracking maps
		const POWER_FROM_SOLAR_IDX = 5;

		/**
		 * Hook function called directly by hmitiles.js whenever a tile is processed
		 */
		window.onHMITileProcess = function(ignoredTileParam, device, rawValue, displayStatus) {
			// Only run this custom code if we are processing our specific Solar tile
			if (parseInt(device.idx, 10) !== POWER_FROM_SOLAR_IDX) {
				return false; // Let hmitiles.js handle all other tiles normally
			}

			// Get the idx given by the gloabl loop as going over all domoticz devices
			const currentIdx = parseInt(device.idx, 10);
			// console.log("onHMITileProcess idx=", currentIdx);

			// -----------------------------------------------------------------
			// CASE 1: PROCESSING THE TEMPERATURE DATA ARRAY (IDX 22)
			// -----------------------------------------------------------------
			if (currentIdx === POWER_FROM_SOLAR_IDX) {
				// 1. Map our thresholds
				const normal = 4000;
				const warning = 1000;
				const alarm = 500;

				// 2. Parse out our current power value
				const dataValue = parseInt(device.Data, 10) || 0;
				
				// 3. Find our elements inside this specific tile card
				const valueDisplay = document.querySelector('.hmi-value-display');
				const badge = document.querySelector('.hmi-badge');
				const iconImg = document.querySelector('.hmi-icon-wrapper img');
				
				let alarmState = "normal";
				let badgeText = "NORMAL";
				let iconSrc = "/images/Alert48_0.png"; // Use standard on-state icon if generating high power

				// 4. Threshold Logic
				if (dataValue >= normal) {
					alarmState = "normal";
					badgeText = "NORMAL";
					iconSrc = "/images/Alert48_0.png";	// Alert icon green
				} else if (dataValue >= warning) {
					alarmState = "warning";
					badgeText = "WARNING";
					iconSrc = "/images/Alert48_2.png";	// Alert icon yellow
				} else {
					alarmState = "alarm";
					badgeText = "ALARM";
					iconSrc = "/images/Alert48_4.png";	// Alert icon red
				}

				// 5. Update UI Safely
				if (valueDisplay) {
					valueDisplay.textContent = `${dataValue} W`;
				}

				if (badge) {
					badge.textContent = badgeText;
					badge.className = `hmi-badge status-${alarmState}`;
				}

				if (iconImg) {
					iconImg.src = iconSrc;
					iconImg.alt = badgeText;
				}

				// Apply a dynamic data attribute to the card for styling flexibility
				const valueCard = document.querySelector(`[data-device-idx="${POWER_FROM_SOLAR_IDX}"]`);
				if (valueCard) {
					valueCard.setAttribute("data-alarm", alarmState);
				}

				// console.log(new Date().toLocaleString(), "valueimagetile updated", dataValue);
				// console.log(new Date().toLocaleTimeString()); 	// Output: "2:34:15 PM"
				// console.log(new Date().toLocaleDateString()); 	// Output: "6/3/2026"
				// console.log(new Date().toISOString());			// Output: "2026-06-03T12:34:15.000Z"

				return false; // Returns false so hmitiles.js can populate text metrics standard values

			}
			
		};

		function goToDomoticzDashboard() {
			window.location.href = "../index.html"; 
		}
	</script>

</head>
<body>

	<!-- Inside the header block of index.html -->
	<header class="hmi-header-container">
		<div style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
			<div style="display: flex; align-items: center; gap: 15px;">
				<button class="hmi-exit-btn" onclick="goToDomoticzDashboard()">◀ Main Menu</button>
				<h2>Value Image Tile</h2>
			</div>
			<div>
				<button class="hmi-exit-btn" onclick="goToHMITilesIndex()">HMITiles Index ➔</button>
			</div>
		</div>
	</header>

    <!-- Master outer panel containing your grid -->
	<!-- Set the device idx according devices list -->
    <main class="hmi-panel">
        
        <!-- 
			TILE 1 ROW 1 COL 1
			ALERT IMAGE + VALUE DATA
			Value also shown in the badge.
			Uses Domoticz images Alert48_n.png located in the www/images folder.
		-->
		<div class="hmi-pack-card" data-type="icon-tile" data-device-idx="5">
			<!-- Header block holding title and status token -->
			<div class="hmi-card-header">
				<div class="hmi-pack-label">Value Image</div>
				<div class="hmi-badge">NORMAL</div>
			</div>

			<!-- Icon Status Row -->
			<div class="hmi-icon-wrapper">
				<img src="/images/Alert48_0.png" alt="Status" width="48" height="48">
			</div>
						
			<!-- Data Value -->
            <div class="hmi-value-grid">
                <div class="hmi-value-box">
                    <div class="hmi-box-data">
                        <span class="hmi-value">--</span>
                    </div>
                </div>
            </div>
		</div>

        <!-- 
			TILE 2 ROW 1 COL 2
			ALERT IMAGE
			Value shown in the badge.
			Uses Domoticz images Alert48_n.png located in the www/images folder.
		-->
		<div class="hmi-pack-card" data-type="icon-tile" data-device-idx="5">
			<!-- Header block holding title and status token -->
			<div class="hmi-card-header">
				<div class="hmi-pack-label">Value Image</div>
				<div class="hmi-badge">NORMAL</div>
			</div>

			<!-- Icon Status Row -->
			<div class="hmi-icon-wrapper">
				<img src="/images/Alert48_0.png" alt="Status" width="48" height="48">
			</div>
		</div>
		
        <!-- 
			TILE 3 ROW 1 COL 3
		-->
		<div class="hmi-pack-card" data-device-idx="5" 
			data-alarm-type="up"
			data-level-info="0"			data-text-info="NO PROD"      	data-state-info="critical"
			data-level-low="1000"       data-text-low="LOW"           	data-state-low="warning"
			data-level-medium="2000"    data-text-medium="MODERATE"     data-state-medium="normal"
			data-level-high="5000"      data-text-high="OPTIMAL"        data-state-high="normal"
			data-level-critical="7000"	data-text-critical="PEAK"		data-state-critical="normal"
			data-text-normal="NORMAL">	
			<div class="hmi-card-header">
				<div class="hmi-pack-label">Solar Generation</div>
				<div class="hmi-badge">NORMAL</div>
			</div>
            <div class="hmi-value-grid">
                <div class="hmi-value-box">
                    <div class="hmi-box-data">
                        <span class="hmi-value">--</span>
                    </div>
                </div>
            </div>
		</div>


		<footer class="hmi-footer-version">
			<span>HMITiles for Domoticz</span>
		</footer>

    </main>
</body>
</html>
