<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Domoticz Log Monitor</title>

    <!-- Link backward one folder level to reuse shared global common styles -->
    <link rel="stylesheet" href="../hmitiles.css">
	
	<!-- Link backward to the HMI tile engine -->
    <script src="../hmitiles.js" defer></script>
</head>
<body>

	<!-- Inside the header block of your sub-pages (e.g., alarmtile/index.html) -->
	<header class="hmi-header-container">
		<div style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
			<!-- Left Side: Main Menu & Title -->
			<div style="display: flex; align-items: center; gap: 15px;">
				<button class="hmi-exit-btn" onclick="goToDomoticzDashboard()">◀ Main Menu</button>
				<h2>Domoticz Log Monitor</h2>
			</div>
			
			<!-- Right Side: Clean dynamic navigation hook back to your master grid -->
			<div>
				<button class="hmi-exit-btn" onclick="goToHMITilesIndex()">HMITiles Index ➔</button>
			</div>
		</div>
	</header>


    <!-- Master outer panel containing your grid -->
	<!-- Set the device idx according devices list -->
    <main class="hmi-panel">
        
        <!-- 
			TILE 1 ROW 1 COL 1
			MONOSPACE SYSTEM LOG TILE WITH DYNAMIC CHANNEL SELECTOR NO FILTER
			NO IDX
		-->
		<div class="hmi-pack-card" data-type="log-monitor" data-log-limit="8" data-log-prefix="[HMI Dashboard]" data-log-filter="">
			<div class="hmi-card-header">
				<div class="hmi-pack-label">Domoticz Server Log</div>
				<select class="hmi-log-channel-select">
					<option value="268435455">ALL LOGS</option>
					<option value="1">STATUS</option>
					<option value="2">DETAIL</option>
					<option value="4">ERRORS</option>
				</select>
			</div>
			
			<div class="hmi-log-terminal">
				<div class="hmi-log-line">Initializing log system link...</div>
			</div>

			<div class="hmi-log-input-row">
				<input type="text" class="hmi-log-input" placeholder="Type custom log message..." maxlength="100">
				<button class="hmi-log-send-btn">SEND</button>
				<button class="hmi-log-clear-btn">CLEAR</button>
			</div>
		</div>

        <!-- 
			TILE 2 ROW 1 COL 2
			MONOSPACE SYSTEM LOG TILE WITH DYNAMIC CHANNEL SELECTOR AND FILTER
			NO IDX
		-->
		<div class="hmi-pack-card" data-type="log-monitor" data-log-limit="8" data-log-prefix="[HMI Dashboard]" data-log-filter="MYTEST">
			<div class="hmi-card-header">
				<div class="hmi-pack-label">Domoticz Server Log Filter MYTEST</div>
				<select class="hmi-log-channel-select">
					<option value="268435455">ALL LOGS</option>
					<option value="1">STATUS</option>
					<option value="2">DETAIL</option>
					<option value="4">ERRORS</option>
				</select>
			</div>
			
			<div class="hmi-log-terminal">
				<div class="hmi-log-line">Initializing log system link...</div>
			</div>

			<div class="hmi-log-input-row">
				<input type="text" class="hmi-log-input" placeholder="Type custom log message..." maxlength="100">
				<button class="hmi-log-send-btn">SEND</button>
				<button class="hmi-log-clear-btn">CLEAR</button>
			</div>
		</div>

        <!-- 
			TILE 3 ROW 1 COL 3
			MONOSPACE SYSTEM LOG TILE WITH NO INPUT ROW
			NO IDX
		-->
		<div class="hmi-pack-card" data-type="log-monitor" data-log-limit="8" data-log-prefix="[HMI Dashboard]" data-log-filter="">
			<div class="hmi-card-header">
				<div class="hmi-pack-label">Domoticz Server Log</div>
				<select class="hmi-log-channel-select">
					<option value="268435455">ALL LOGS</option>
					<option value="1">STATUS</option>
					<option value="2">DETAIL</option>
					<option value="4">ERRORS</option>
				</select>
			</div>
			
			<div class="hmi-log-terminal">
				<div class="hmi-log-line">Initializing log system link...</div>
			</div>

			<div class="hmi-log-input-row" style="display: none; height: 0">
				<input type="text" class="hmi-log-input" placeholder="Type custom log message..." maxlength="100">
				<button class="hmi-log-send-btn">SEND</button>
				<button class="hmi-log-clear-btn">CLEAR</button>
			</div>
		</div>

		<!-- 
			TILE 4 ROW 1 COL 4
			HOLLOW GRID MATRIX PLACEHOLDER 
		-->
		<div class="hmi-pack-card hmi-card-placeholder">
			<div class="hmi-card-header">
				<div class="hmi-pack-label">[ SPARE BAY COMPONENT ]</div>
			</div>
		</div>


		<!-- 
			TILE 5 ROW 2 COL 1
			HMITILES COMPONENT: LOG MONITOR EXTENSION
			Added the .hmi-log-fullpage class to strip inputs and maximize vertical/horizontal viewports 
		-->
		<div class="hmi-pack-card hmi-log-fullpage" data-type="log-monitor" data-log-limit="8" data-log-prefix="[HMI Dashboard]" data-log-filter="">
			<div class="hmi-card-header">
				<div class="hmi-pack-label">Domoticz Server Log</div>
				<select class="hmi-log-channel-select">
					<option value="268435455">ALL LOGS</option>
					<option value="1">STATUS</option>
					<option value="2">DETAIL</option>
					<option value="4">ERRORS</option>
				</select>
			</div>
			
			<!-- Scrollable Terminal Box (Will inherit 65vh Height automatically) -->
			<div class="hmi-log-terminal">
				<div class="hmi-log-line">Initializing log system link...</div>
			</div>

			<!-- Input Row Wrapper (Will be completely hidden by the CSS engine override rules) -->
			<div class="hmi-log-input-row">
				<input type="text" class="hmi-log-input" placeholder="Type command...">
				<button class="hmi-log-btn">Send</button>
			</div>
		</div>

		<footer class="hmi-footer-version">
			<span>HMITiles for Domoticz</span>
		</footer>

    </main>
</body>
</html>
