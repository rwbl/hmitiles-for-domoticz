<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Setpoint ProcessValue Tile</title>

    <!-- Link backward one folder level to reuse shared global common styles -->
    <link rel="stylesheet" href="../hmitiles.css">
	
	<!-- Link backward to the HMI tile engine -->
    <script src="../hmitiles.js" defer></script>
</head>
<body>

	<!-- Inside the header block of your sub-pages (e.g., alarmtile/index.html) -->
	<header class="hmi-header-bar">
		<!-- Left Sector Group -->
		<div class="hmi-header-left-group">
			<button class="hmi-exit-btn" onclick="goToDomoticzDashboard()">&#9664; Main Menu</button>
			<h2 class="hmi-header-title">
				Setpoint-ProcessValue Tile
			</h2>
		</div>
		
		<!-- Right Sector Group -->
		<div class="hmi-header-right-group">
			<button class="hmi-exit-btn" onclick="goToHMITilesIndex()">HMITiles Index &#9654;</button>
		</div>
	</header>

    <!-- Master outer panel containing your grid -->
	<!-- Set the device idx according devices list -->
    <main class="hmi-panel">
        
        <!-- 
			TILE 1 ROW 1 COL 1
			THERMOSTAT (SP) + TEMPERATURE (PV)
			IDX 2 = Type Setpoint, SubType Setpoint
			IDX 22 = Type Temperature, SubType LaCrosse
		-->
		<div class="hmi-pack-card" 
			data-device-idx="2" 
			data-type="setpoint-processvalue-tile" 
			data-pv-idx="22" 
			data-unit="°C" 
			data-step="0.5">
			<div class="hmi-card-header">
				<div class="hmi-pack-label">Thermostat</div>
				<div class="hmi-badge"></div>
			</div>
			
			<div class="hmi-value-grid">
				<!-- STEP 1 ROW: Interactive Target Setpoint Stepper (SP) -->
				<div class="hmi-stepper-row">
					<button class="hmi-btn-step hmi-btn-down">-</button>
					<div class="hmi-sp-value hmi-value" style="font-size: 16px; width: 60px; text-align: center;">--</div>
					<button class="hmi-btn-step hmi-btn-up">+</button>
				</div>
				
				<!-- STEP 2 ROW: Read-Only Actual Feedback Tracker (PV) -->
				<div class="hmi-pv-row">
					<span class="hmi-column-label" style="margin-bottom: 0;">Actual (PV):</span>
					<div class="hmi-value-box" style="width: auto; min-width: 80px;">
						<div class="hmi-pv-value hmi-value" style="font-size: 16px;">--</div>
					</div>
				</div>
			</div>
		</div>

		<footer class="hmi-footer-version">
			<span>HMITiles for Domoticz</span>
		</footer>

    </main>
</body>
</html>
