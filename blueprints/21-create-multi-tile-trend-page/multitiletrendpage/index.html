<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Custom Page</title>

    <!-- Link backward one folder level to reuse shared global common styles -->
    <link rel="stylesheet" href="../hmitiles.css">
	
	<!-- Link backward to the HMI tile engine -->
    <script src="../hmitiles.js" defer></script>

	<script>
		// =========================================================================
		// LOCAL SCRIPT CONFIGURATION
		// =========================================================================
		// Device idx
		const POWER_FROM_SOLAR_IDX = 5;
		const TIMESTAMP_IDX = 23;

		// Gateway lock variable to prevent infinite loop refresh collisions
		let lastPushedTime = "";

		// =========================================================================
		// CENTRAL ECOSYSTEM HOOK (Intercepts global hmitiles.js loop at top level)
		// =========================================================================
		window.onHMITileProcess = function(ignoredTileParam, device, rawValue, displayStatus) {
			// Get the idx given by the global loop as going over all domoticz devices
			const currentIdx = parseInt(device.idx, 10);
			// console.log("onHMITileProcess idx=", currentIdx);

			// -----------------------------------------------------------------
			// CASE 1: PROCESSING THE POWER_FROM_SOLAR DATA ARRAY (IDX 5)
			// -----------------------------------------------------------------
			if (currentIdx === POWER_FROM_SOLAR_IDX) {
				// Find independent trend layout graph anywhere on the page
				// FIXED: Dynamically injects the POWER_FROM_SOLAR_IDX configuration variable
				const trendContainer = document.querySelector(`[data-chart-idx="${POWER_FROM_SOLAR_IDX}"]`);
				if (trendContainer) {
					// Executes your raw untouched async analytics tracker pipeline!
					fetchTrendData(POWER_FROM_SOLAR_IDX, "counter", "W", trendContainer);
				}
				return false; // Returns false so hmitiles.js can populate text metrics standard values
			}

			// -----------------------------------------------------------------
			// CASE 2: PROCESSING VIRTUAL TEXT TIMESTAMP (IDX 23)
			// -----------------------------------------------------------------
			if (currentIdx === TIMESTAMP_IDX) {
				const timeCard = document.querySelector(`[data-device-idx="${TIMESTAMP_IDX}"]`);
				if (timeCard) {
					const timeField = timeCard.querySelector('.hmi-value-timestamp');
					if (timeField) {
						timeField.textContent = device.Data || device.Status || "--:--";
					}
				}
				return false; // Changed to false: lets hmitiles.js finish generic card layout rendering
			}

			return false; 
		};

		// =========================================================================
		// NESTED ASYNC FUNCTIONS (Completely Untouched - Only Loop Locked)
		// =========================================================================
		async function fetchTrendData(idx, sensor, unit, container) {
			try {
				const targetUrl = `${DOMOTICZ_URL}/json.htm?type=command&param=graph&sensor=${sensor}&idx=${idx}&range=day`;
				console.log(`[fetchTrendData] ${targetUrl}`);

				const response = await fetch(targetUrl);
				if (!response.ok) throw new Error();
				const data = await response.json();

				if (data.result && data.result.length > 0) {
                    const points = data.result.map(item => parseFloat(item.v || item.v_1 || item.u || item.svalue || 0));
					renderSparkline(container, points, unit);

					const lastItem = data.result[data.result.length - 1];
					const lastTimestamp = lastItem.d; 
					
					if (lastTimestamp) {
						const timeOnly = lastTimestamp.split(' ')[1] || lastTimestamp;
						
						// Only send data if the value actually changed
						if (timeOnly !== lastPushedTime) {
							lastPushedTime = timeOnly;
							await pushTimestampToDevice(TIMESTAMP_IDX, timeOnly);
						}
					}
				} else {
					container.innerHTML = "<span style='color:#999; font-size:12px;'>No historical logs</span>";
				}
			} catch (err) {
				console.error("Trend load error:", err);
				container.innerHTML = "<span style='color:#ff0000; font-size:12px;'>API Error</span>";
			}
		}

		async function pushTimestampToDevice(idx, timeString) {
			try {
				const updateUrl = `${DOMOTICZ_URL}/json.htm?type=command&param=udevice&idx=${idx}&nvalue=0&svalue=${encodeURIComponent(timeString)}`;
				// console.log(`[pushTimestampToDevice] ${updateUrl}`);
				const response = await fetch(updateUrl);
				
				if (response.ok) {
					// FORCE IMMEDIATE UI UPDATE: Find the timestamp card and inject the value on the fly
					const timeCard = document.querySelector(`[data-device-idx="${idx}"]`);
					if (timeCard) {
						// fetchTextTimestamp(idx, timeCard);
						const timeField = timeCard.querySelector('.hmi-value');
						if (timeField) {
							timeField.textContent = timeString; // Write immediately instead of waiting for next server pass
						}
					}
				}
			} catch (err) {
				console.error(`Failed to update Domoticz text device ${idx}: `, err);
			}
		}

		async function fetchTextTimestamp(idx, element) {
			try {
				const response = await fetch(`${DOMOTICZ_URL}/json.htm?type=command&param=getdevices&rid=${idx}`);
				if (!response.ok) throw new Error();
				const data = await response.json();

				if (data && data.result && data.result[0]) {
					const devicePayload = data.result[0];
					const timeField = element.querySelector('.hmi-value');
					if (timeField) {
						timeField.textContent = devicePayload.Data || devicePayload.Status || "--:--";
					}
				}
			} catch (err) {
				console.error(`Failed to fetch timestamp from device ${idx}:`, err);
			}
		}

        // Pure layout utility functions can remain outside since they don't contain risk variables
        function renderSparkline(container, dataPoints, unit) {
            const width = 300;
            const height = 100;
            const padding = 5;

            const min = Math.min(...dataPoints);
            const max = Math.max(...dataPoints);
            const range = max - min === 0 ? 1 : max - min;

            const coords = dataPoints.map((val, index) => {
                const x = padding + (index / (dataPoints.length - 1)) * (width - padding * 2);
                const y = (height - padding) - ((val - min) / range) * (height - padding * 2);
                return `${x},${y}`;
            });

            container.innerHTML = `
                <div class="hmi-sparkline-svg-wrapper">
                    <svg viewBox="0 0 ${width} ${height}" class="hmi-sparkline-svg" preserveAspectRatio="none">
                        <path class="hmi-trend-line" d="M ${coords.join(' L ')}" />
                    </svg>
                </div>
                <div class="hmi-trend-stats">
                    <div><span class="hmi-stat-label">MIN:</span> ${Math.round(min)}${unit}</div>
                    <div><span class="hmi-stat-label">MAX:</span> ${Math.round(max)}${unit}</div>
                </div>
            `;
        }

        function goToDomoticzDashboard() {
            window.location.href = "../index.html";
        }

	</script>

</head>
<body>

	<!-- Inside the header block of index.html -->
	<header class="hmi-header-container">
		<div style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
			<div style="display: flex; align-items: center; gap: 15px;">
				<button class="hmi-exit-btn" onclick="goToDomoticzDashboard()">◀ Main Menu</button>
				<h2>My Custom Page</h2>
			</div>
		</div>
	</header>

    <!-- Master outer panel containing your grid -->
    <main class="hmi-panel">
        
        <!-- 
			TILE 1 ROW 1 COL 1: POWER PRODUCTION
			Set the device idx according devices list
			IDX 5
		-->
        <div class="hmi-pack-card hmi-clickable-card" data-device-idx="5" data-alarm="normal">
            <div class="hmi-card-header">
                <div class="hmi-pack-label">Solar Production</div>
                <div class="hmi-badge">NORMAL</div>
            </div>
            <div class="hmi-value-grid">
                <div class="hmi-value-box">
                    <div class="hmi-box-data">
                        <span class="hmi-value">--</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 
			TILE 2 ROW 1 COL 2: POWER PRODUCTION TREND 
			Set the device idx according devices list
			IDX 5
		-->
        <div class="hmi-pack-card">
            <div class="hmi-card-header"><div class="hmi-pack-label">Solar Production (24h)</div></div>
            <div class="hmi-value-grid"><div class="hmi-sparkline-container" data-chart-idx="5">Loading...</div></div>
        </div>

        <!-- 
			TILE 3 ROW 1 COL 3: DATA POINT TIMESTAMP
			Set the device idx according devices list
			IDX 13
		-->
		<div class="hmi-pack-card" data-device-idx="13">
			<div class="hmi-card-header">
				<div class="hmi-pack-label">Last Update</div>
			</div>
			<div class="hmi-value-grid">
				<div class="hmi-value-box">
					<div class="hmi-box-data hmi-time-display">
                        <span class="hmi-value">--:--:--</span>
                    </div>
				</div>
			</div>
		</div>

		<footer class="hmi-footer-version">
			<span>HMITiles for Domoticz v1.0.0-Beta</span>
		</footer>

    </main>
</body>
</html>
