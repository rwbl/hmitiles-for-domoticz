<!DOCTYPE html>
<html lang="en">
<!--

<head>
    <meta charset="UTF-8">
    <title>Solar Info Dashboard Rolling 24-Hour Trends</title>

	<!-- Includes located in the parent folder -->
	<link rel="stylesheet" href="../hmitiles.css">
	<script src="../hmitiles.js" defer></script>
	
	<script>
	
		// =========================================================================
		// LOCAL CONFIGURATION PARAMETERS
		// =========================================================================
		const SYSTEM_TIME_IDX = 13;
		const BATTERY_LEVEL_IDX = 12;

		/**
		 * Ecosystem hook called directly by hmitiles.js central loop engine
		 */
		window.onHMITileProcess = function(ignoredTileParam, device, rawValue, displayStatus) {
		
			const currentIdx = parseInt(device.idx, 10);

			// 1. DYNAMIC MATCH FOR CHART CONTAINERS
			// Instead of a hardcoded loop, check if this device has a trend target box mounted on the page
			const trendContainer = document.querySelector(`[data-chart-idx="${currentIdx}"]`);
			if (trendContainer) {
				// Dynamically determine type variables based on your device profile rules
				const sensorType = (currentIdx === BATTERY_LEVEL_IDX) ? "Percentage" : "counter";
				const unit = (currentIdx === BATTERY_LEVEL_IDX) ? "%" : "W";
				
				// Execute your pristine background logging data worker safely
				fetchTrendData(currentIdx, sensorType, unit, trendContainer);
			}

			// 2. PROCESS SYSTEM TIME STATUS (IDX 13)
			if (currentIdx === SYSTEM_TIME_IDX) {
				const timeCard = document.querySelector(`[data-device-idx="${SYSTEM_TIME_IDX}"]`);
				if (timeCard) {
					const timeField = timeCard.querySelector('.hmi-value') || timeCard.querySelector('.hmi-value-display');
					if (timeField) {
						// Grabs the exact, formatted string text pushed from your system
						timeField.textContent = device.Data || device.Status || "--:--:--";
					}
				}
				return true; // Handled completely, skip standard processing
			}

			return false; // Let hmitiles.js process baseline decorations for all other trends normally
		};

		// =========================================================================
		// BACKGROUND ASYNC LOGIC WORKERS (Your Original Functions Preserved)
		// =========================================================================
		async function fetchTrendData(idx, sensor, unit, container) {
			try {
				// FIXED: Restored to your original working endpoint syntax configuration parameters
				const targetUrl = `${DOMOTICZ_URL}/json.htm?type=command&param=graph&sensor=${sensor}&idx=${idx}&range=day`;

				const response = await fetch(targetUrl);
				if (!response.ok) throw new Error();
				const data = await response.json();

				if (data.result && data.result.length > 0) {
					// Extracts metrics vectors safely from data point arrays
					const points = data.result.map(item => parseFloat(item.v || item.v_1 || item.u || item.svalue || item.te || 0));
					renderSparkline(container, points, unit);
				} else {
					container.innerHTML = "<span style='color:#999; font-size:12px;'>No historical logs</span>";
				}
			} catch (err) {
				console.error("Trend load error:", err);
				container.innerHTML = "<span style='color:#ff0000; font-size:12px;'>API Error</span>";
			}
		}

		function renderSparkline(container, dataPoints, unit) {
			const width = 300;
			const height = 100;
			const padding = 5;

			const min = Math.min(...dataPoints);
			const max = Math.max(...dataPoints);
			const range = max - min === 0 ? 1 : max - min;

			const coords = dataPoints.map((val, index) => {
				const x = padding + (index / (dataPoints.length - 1)) * (width - padding * 2);
				const y = (height - padding) - ((val - min) / range) * (height - padding * 2);
				return `${x},${y}`;
			});

			container.innerHTML = `
				<div class="hmi-sparkline-svg-wrapper">
					<svg viewBox="0 0 ${width} ${height}" class="hmi-sparkline-svg" preserveAspectRatio="none">
						<path class="hmi-trend-line" d="M ${coords.join(' L ')}" />
					</svg>
				</div>
				<div class="hmi-trend-stats">
					<div><span class="hmi-stat-label">MIN:</span> ${Math.round(min)}${unit}</div>
					<div><span class="hmi-stat-label">MAX:</span> ${Math.round(max)}${unit}</div>
				</div>
			`;
		}

		// Go back to the index page
		function goToMainDashboard() {
			window.location.href = "index.html";
		}

	</script>

</head>
<body>

	<header class="hmi-header-container">
		<div style="display: flex; align-items: center; gap: 15px;">
			<button class="hmi-exit-btn" onclick="goToMainDashboard()">◀ Live Values</button>
			<h2>Solar Info Dashboard - Rolling 24-Hour Trends</h2>
		</div>
	</header>

    <main class="hmi-panel">
        
        <!-- ROW 1: POWER PRODUCTION & CONSUMPTION -->
		<!-- COL 1-4 -->
        <div class="hmi-pack-card">
            <div class="hmi-card-header"><div class="hmi-pack-label">Production</div></div>
            <div class="hmi-value-grid"><div class="hmi-sparkline-container" data-chart-idx="5">Loading...</div></div>
        </div>

        <div class="hmi-pack-card">
            <div class="hmi-card-header"><div class="hmi-pack-label">Export</div></div>
            <div class="hmi-value-grid"><div class="hmi-sparkline-container" data-chart-idx="8">Loading...</div></div>
        </div>

        <div class="hmi-pack-card">
            <div class="hmi-card-header"><div class="hmi-pack-label">Import</div></div>
            <div class="hmi-value-grid"><div class="hmi-sparkline-container" data-chart-idx="7">Loading...</div></div>
        </div>

        <div class="hmi-pack-card">
            <div class="hmi-card-header"><div class="hmi-pack-label">Consumption</div></div>
            <div class="hmi-value-grid"><div class="hmi-sparkline-container" data-chart-idx="9">Loading...</div></div>
        </div>

        <!-- ROW 2: BATTERY STORAGE MANAGEMENT -->
		<!-- COL 1-4 -->
        <div class="hmi-pack-card">
            <div class="hmi-card-header"><div class="hmi-pack-label">BAT Charging</div></div>
            <div class="hmi-value-grid"><div class="hmi-sparkline-container" data-chart-idx="10">Loading...</div></div>
        </div>

        <div class="hmi-pack-card">
            <div class="hmi-card-header"><div class="hmi-pack-label">BAT Discharging</div></div>
            <div class="hmi-value-grid"><div class="hmi-sparkline-container" data-chart-idx="11">Loading...</div></div>
        </div>

        <div class="hmi-pack-card">
            <div class="hmi-card-header"><div class="hmi-pack-label">BAT State</div></div>
            <div class="hmi-value-grid"><div class="hmi-sparkline-container" data-chart-idx="12">Loading...</div></div>
        </div>

		<div class="hmi-pack-card" data-device-idx="13">
			<div class="hmi-card-header">
				<div class="hmi-pack-label">Last Update</div>
				<div class="hmi-badge">SYNCED</div>
			</div>
            <div class="hmi-value-grid">
                <div class="hmi-value-box">
                    <div class="hmi-box-data">
                        <span class="hmi-value">--</span>
                    </div>
                </div>
            </div>
		</div>

		<!--
        <div class="hmi-pack-card hmi-card-placeholder">
            <div class="hmi-card-header"><div class="hmi-pack-label">[ NEW BAY ]</div></div>
        </div>
		-->

		<footer class="hmi-footer-version">
			<span>HMITiles for Domoticz</span>
		</footer>

    </main>

</body>
</html>
