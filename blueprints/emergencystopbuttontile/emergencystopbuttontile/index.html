<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Emergency Stop Button</title>

    <!-- Link backward one folder level to reuse shared global common styles -->
    <link rel="stylesheet" href="../hmitiles.css">
	
	<!-- Link backward to the HMI tile engine -->
    <script src="../hmitiles.js" defer></script>
</head>
<body>

	<!-- Inside the header block of your sub-pages (e.g., alarmtile/index.html) -->
	<header class="hmi-header-bar">
		<!-- Left Sector Group -->
		<div class="hmi-header-left-group">
			<button class="hmi-exit-btn" onclick="goToDomoticzDashboard()">&#9664; Main Menu</button>
			<h2 class="hmi-header-title">
				Emergency Stop
			</h2>
		</div>
		
		<!-- Right Sector Group -->
		<div class="hmi-header-right-group">
			<button class="hmi-exit-btn" onclick="goToHMITilesIndex()">HMITiles Index &#9654;</button>
		</div>
	</header>


    <!-- Master outer panel containing your grid -->
	<!-- Set the device idx according devices list -->
    <main class="hmi-panel">
        
        <!-- 
			TILE 1 ROW 1 COL 1
			EMERGENCY STOP BUTTON (Reusing Switch Infrastructure)
			- data-alarm-type="up" means if the value matches or goes above our level, it triggers.
			- data-level-critical="1" triggers critical state when the switch is ON (1).
			- data-text-normal="E-STOP" keeps your static text when the system is healthy (0).
		-->
		<div class="hmi-pack-card" data-type="switch" data-device-idx="6" 
			 data-action="On" data-on-text="TRIP" data-off-text="TRIP"
			 data-alarm-type="up"
			 data-level-info="0"     data-text-info="E-STOP"	data-state-info="critical"
			 data-level-critical="1" data-text-critical="E-STOP" data-state-critical="critical"
			 data-text-normal="E-STOP">
			<div class="hmi-card-header">
				<div class="hmi-pack-label">Switch/Switch/Push On Button</div>
				<div class="hmi-badge hmi-clickable-badge">E-STOP</div>
			</div>
            <div class="hmi-value-grid">
                <div class="hmi-value-box">
                    <div class="hmi-box-data">
						<!-- No class set to be able to use the text defined --->
                        <span class="">EMERGENCY STOP</span>
                    </div>
                </div>
            </div>
			<div class="hmi-last-update" data-text="static">
				<span class="hmi-value-update" data-field="LastUpdate">YYYY-MM-DD hh:mm:ss</span>
			</div>
		</div>

		<footer class="hmi-footer-version">
			<span>HMITiles for Domoticz</span>
		</footer>

    </main>
</body>
</html>
