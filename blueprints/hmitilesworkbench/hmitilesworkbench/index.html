<!DOCTYPE html>
<html lang="en">
<!--
File: index
Project: Domoticz HMITiles Workbench
Brief: Dynamically extracts, displays, and live-polls all tile templates as defined in hmitiles.index.
Date: 2026-06-15
Author: Robert W.B. Linn (c) 2026 MIT
Description: All tiles have default Domoticz device idx set. Change accordingly to see live data.
-->
<head>
    <meta charset="UTF-8">
    <title>HMITiles Workbench</title>
    <!-- 1. Link back to your common shared style assets up one level -->
    <link rel="stylesheet" href="../hmitiles.css">
    
    <!-- 2. Link back to your common shared generic engine script up one level -->
    <!-- Note: Added defer to ensure the template injects before the polling loop kicks off -->
    <script src="../hmitiles.js" defer></script>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            
            // =========================================================================
            // WORKBENCH LOCAL EMBEDDED MOCK ENGINE HOOK
            // =========================================================================
            // 1. Simulate the background system server logs
            window.fetchDomoticzServerLogs = async function() {
                const tileElement = document.querySelector('[data-type="log-monitor"]');
                if (!tileElement) return;

                const terminal = tileElement.querySelector('.hmi-log-terminal');
                if (!terminal) return;

                const mockLogs = [
                    { message: "2026-06-05 18:00:11.471  Status: [HMI Dashboard] ***TESTMSG***" },
                    { message: "2026-06-05 18:01:24.810  Script: dzVents: [SolarInfoDashboard] Solar data received." },
                    { message: "2026-06-05 18:02:45.102  Error: dzVents: syntax error near 'local' on line 23" }
                ];

                terminal.innerHTML = "";
                mockLogs.forEach(item => {
                    const line = document.createElement('div');
                    line.className = "hmi-log-line";
                    line.textContent = item.message;

                    const upperMsg = item.message.toUpperCase();
                    if (upperMsg.includes("ERROR") || upperMsg.includes("CRITICAL")) {
                        line.className = "hmi-log-line hmi-log-error";
                    } else if (upperMsg.includes("DZVENTS") || upperMsg.includes("LUA") || upperMsg.includes("SCRIPT")) {
                        line.className = "hmi-log-line hmi-log-script";
                    }
                    terminal.appendChild(line);
                });
                terminal.scrollTop = terminal.scrollHeight;
            };

            // 2. OVERRIDE: Inject fake hardware values for offline workbench testing
            // This replaces the real fetch loop to populate empty placeholders like '--'
            window.fetchDomoticzData = async function() {
                if (typeof processDevices !== "function") return;

                // Simulated server response payload array containing every required testing value
                const workbenchMockDevices = [
                    { idx: "1", Name: "Any Type Value", Data: "1943", Status: "1943 Watt" },
                    { idx: "2", Name: "General/Percentage Progress Bar", Data: "100", Status: "100%" },
                    { idx: "3", Name: "Temp+Humidity/TH", Temp: 21.4, Humidity: 55, Status: "NORMAL" },
                    { idx: "4", Name: "Temp+Humidity+Baro/TH,BTH", Temp: 19.8, Humidity: 48, Barometer: 1013, Status: "NORMAL" },
                    { idx: "5", Name: "General/Barometer", Data: "1021.34", Status: "1021.34 hPa" },
                    { idx: "6", Name: "Switch/Switch/On/Off", Status: "On" },
                    { idx: "7", Name: "Switch/Switch/On/Off (Pump)", Status: "On" },
                    { idx: "8", Name: "Switch/Switch/Dimmer", Data: "66", Status: "SET LEVEL: 66 %" },
                    { idx: "9", Name: "Setpoint/Setpoint", SetPoint: "20.0", Data: "20.0" },
                    
                    // Injected values specifically matching your multi-variable components
                    { idx: "10", Name: "Setpoint + Process Value", SetPoint: "21.5", Status: "HEATING" },
                    { idx: "11", Name: "Process Value Sensor", Temp: "19.5", Data: "19.5" }, // Maps to data-pv-idx
                    
                    // Injected values for alarm thresholds to overwrite the '--' markers
                    { idx: "16", Name: "General/Percentage Alarm Warning/Critical", Data: "8.4", Status: "8.4 %" },
                    { idx: "17", Name: "General/Percentage Alarm ZERO", Data: "0.0", Status: "0.0 %" },
                    
                    { idx: "18", Name: "Any Type Image+Value", Data: "OK", Status: "NORMAL" },
                    { idx: "19", Name: "Switch/Switch/Push On Button Static Text", Status: "OFF" },
                    { idx: "20", Name: "Light/Switch/Selector Switch", Level: 0, Status: "Off" },

                    { idx: "21", Name: "General/Text/Input/Number", Data: "1234"}

                ];

                // Pass the simulated payload array into your core hmitiles.js rendering engine
                processDevices(workbenchMockDevices);
            };

            // =========================================================================
            // WORKBENCH LOCAL EMBEDDED MATRIX SIMULATOR HOOK
            // =========================================================================
            // Simulates a real batched HTTP data packet response locally
            window.fetchDomoticzMatrixStatus = async function() {
                const matrixTiles = document.querySelectorAll('[data-type="indicator-matrix"]');
                if (matrixTiles.length === 0) return;

                // Fake result payload matching your 9 custom devices exactly
                const mockMatrixDevices = [
                    { idx: "41", Status: "OK" },
                    { idx: "42", Status: "DISABLED" },
                    { idx: "43", Status: "DISABLED" },
                    { idx: "44", Status: "OK" },
                    { idx: "45", Status: "DISABLED" },
                    { idx: "46", Status: "DISABLED" },
                    { idx: "47", Status: "DISABLED" },
                    { idx: "48", Status: "DISABLED" },
                    { idx: "49", Status: "ERROR" }
                ];

                matrixTiles.forEach(matrixTile => {
                    const idxString = matrixTile.getAttribute('data-device-idx') || "";
                    if (!idxString) return;

                    const csvArray = idxString.split(",");

                    csvArray.forEach((targetIdx, cellIndex) => {
                        const cellElement = matrixTile.querySelector(`[data-cell-index="${cellIndex}"]`);
                        if (!cellElement) return;

                        const deviceData = mockMatrixDevices.find(d => String(d.idx) === String(targetIdx));
                        
                        cellElement.classList.remove('state-ok', 'state-error', 'state-disabled');

                        if (deviceData) {
                            const statusText = String(deviceData.Status).toUpperCase();
                            if (statusText === "ERROR" || statusText === "ALARM" || statusText === "OFF") {
                                cellElement.classList.add('state-error'); // Black
                            } else if (statusText === "DISABLED" || statusText === "GRAY" || statusText === "NONE") {
                                cellElement.classList.add('state-disabled'); // Gray
                            } else {
                                cellElement.classList.add('state-ok'); // White
                            }
                        }
                    });
                });
            };

            // =========================================================================
            // COMPONENT COMPILATION AND RENDERING LIFECYCLE
            // =========================================================================
            try {
                const response = await fetch("hmitiles.index");
                if (!response.ok) throw new Error(`HTTP error: ${response.status}`);
                const text = await response.text();
                
                const parser = new DOMParser();
                const doc = parser.parseFromString(text, "text/html");
                const allTemplateCards = doc.querySelectorAll('.hmi-pack-card');
                const targetGrid = document.getElementById("hmi-library-grid");
                
                allTemplateCards.forEach(card => {
                    const clonedCard = card.cloneNode(true);
                    targetGrid.appendChild(clonedCard);
                });

                console.log(`Successfully generated dynamic library with ${allTemplateCards.length} tiles.`);
                
                // Fire your local mock loops sequentially to hydrate the interface elements
                if (typeof window.fetchDomoticzData === "function") {
                    window.fetchDomoticzData();
                }
                if (typeof window.fetchDomoticzServerLogs === "function") {
                    window.fetchDomoticzServerLogs();
                }
				// Safely trigger your standalone window simulator hook
                if (typeof window.fetchDomoticzMatrixStatus === "function") {
                    window.fetchDomoticzMatrixStatus();
                }
            } catch (err) {
                console.error("Failed to compile local components master library view:", err);
                document.getElementById("hmi-library-grid").innerHTML = 
                    `<div style="color:red; padding:20px;">Library Load Error: Ensure index.html and hmitiles.index are in the same folder!</div>`;
            }
        });
    </script>

</head>

<body>

	<!-- Inside the header block of index.html -->
    <header class="hmi-header-container">
		<div style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
			<div style="display: flex; align-items: center; gap: 15px;">
				<button class="hmi-exit-btn" onclick="goToDomoticzDashboard()">◀ Main Menu</button>
				<h1>HMITiles Workbench</h1>
			</div>
		</div>
    </header>

    <!-- The common industrial matrix panel grid layout -->
    <main id="hmi-library-grid" class="hmi-panel">
        <!-- All live card components from hmitiles.index will cleanly render right here -->
    </main>

	<footer class="hmi-footer-version">
		<span>HMITiles for Domoticz</span>
	</footer>

</body>

</html>
